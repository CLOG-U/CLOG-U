<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Carlos Ortiz engineering log banner</title>
  <desc id="desc">Vibrant original profile banner for Carlos Ortiz, software engineering student focused on applied AI, data and useful systems.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#030712"/>
      <stop offset="0.42" stop-color="#172554"/>
      <stop offset="0.72" stop-color="#4c1d95"/>
      <stop offset="1" stop-color="#701a75"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.34" stop-color="#60a5fa"/>
      <stop offset="0.68" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="cyanGlow">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pinkGlow">
      <stop offset="0" stop-color="#f472b6" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#e0e7ff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#020617" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="30" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="30" fill="url(#grid)"/>
  <ellipse cx="1080" cy="70" rx="250" ry="190" fill="url(#pinkGlow)" opacity="0.62"/>
  <ellipse cx="90" cy="390" rx="300" ry="210" fill="url(#cyanGlow)" opacity="0.5"/>

  <g opacity="0.9">
    <circle cx="1030" cy="108" r="116" fill="none" stroke="#f0abfc" stroke-opacity="0.4" stroke-width="2">
      <animate attributeName="r" values="105;122;105" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.2;0.55;0.2" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1030" cy="108" r="78" fill="none" stroke="#67e8f9" stroke-opacity="0.55" stroke-width="2" stroke-dasharray="10 9">
      <animateTransform attributeName="transform" type="rotate" from="0 1030 108" to="360 1030 108" dur="16s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1030" cy="108" r="42" fill="#a855f7" fill-opacity="0.16" stroke="#f9a8d4" stroke-width="2"/>
    <circle cx="1030" cy="108" r="9" fill="#f9a8d4" filter="url(#softGlow)">
      <animate attributeName="r" values="7;11;7" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g fill="#ffffff" opacity="0.7">
    <circle cx="754" cy="76" r="2"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="835" cy="190" r="2"><animate attributeName="opacity" values="1;0.2;1" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="1132" cy="245" r="2"><animate attributeName="opacity" values="0.2;1;0.2" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="925" cy="325" r="2"><animate attributeName="opacity" values="1;0.25;1" dur="2.8s" repeatCount="indefinite"/></circle>
  </g>

  <rect x="58" y="42" width="218" height="38" rx="19" fill="#020617" fill-opacity="0.72" stroke="#22d3ee" stroke-opacity="0.75"/>
  <circle cx="79" cy="61" r="6" fill="#34d399" filter="url(#softGlow)">
    <animate attributeName="opacity" values="1;0.35;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="96" y="67" fill="#a5f3fc" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="800" letter-spacing="1.6">CLOG-U // SYSTEM ONLINE</text>

  <text x="58" y="164" fill="#ffffff" font-size="66" font-family="Segoe UI, Arial, sans-serif" font-weight="900" filter="url(#shadow)">Carlos Ortiz</text>
  <rect x="58" y="188" width="610" height="7" rx="3.5" fill="url(#accent)" filter="url(#softGlow)"/>
  <text x="58" y="242" fill="#e0e7ff" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="600">Building software that connects ideas, data and people.</text>
  <text x="58" y="282" fill="#cbd5e1" font-size="20" font-family="Segoe UI, Arial, sans-serif">Software Engineering • Applied AI • Data • Backend</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">
    <rect x="58" y="326" width="140" height="42" rx="12" fill="#083344" fill-opacity="0.9" stroke="#22d3ee" stroke-opacity="0.9"/>
    <text x="87" y="352" fill="#cffafe">📍 MANTA, EC</text>

    <rect x="214" y="326" width="174" height="42" rx="12" fill="#312e81" fill-opacity="0.9" stroke="#818cf8" stroke-opacity="0.95"/>
    <text x="242" y="352" fill="#e0e7ff">🎓 ULEAM • 5TH</text>

    <rect x="404" y="326" width="232" height="42" rx="12" fill="#581c87" fill-opacity="0.9" stroke="#e879f9" stroke-opacity="0.95"/>
    <text x="433" y="352" fill="#fae8ff">⚡ LEARN → BUILD → EXPLAIN</text>
  </g>

  <g transform="translate(786 242)" filter="url(#shadow)">
    <rect width="344" height="136" rx="18" fill="#020617" fill-opacity="0.68" stroke="url(#accent)" stroke-width="1.5"/>
    <circle cx="24" cy="23" r="5" fill="#fb7185"/>
    <circle cx="42" cy="23" r="5" fill="#facc15"/>
    <circle cx="60" cy="23" r="5" fill="#4ade80"/>
    <text x="24" y="58" fill="#67e8f9" font-size="15" font-family="Consolas, monospace">const currentMission = {</text>
    <text x="43" y="83" fill="#ddd6fe" font-size="15" font-family="Consolas, monospace">build: "useful systems",</text>
    <text x="43" y="106" fill="#fbcfe8" font-size="15" font-family="Consolas, monospace">levelUp: "every project"</text>
    <text x="24" y="128" fill="#67e8f9" font-size="15" font-family="Consolas, monospace">};</text>
  </g>
</svg>