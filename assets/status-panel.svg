<svg xmlns="http://www.w3.org/2000/svg" width="520" height="220" viewBox="0 0 520 220" role="img" aria-labelledby="title desc">
  <title id="title">Carlos Ortiz system status</title>
  <desc id="desc">Local profile telemetry panel for Carlos Ortiz.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#2e1065"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#020617" flood-opacity="0.48"/>
    </filter>
  </defs>

  <rect width="520" height="220" rx="22" fill="url(#bg)"/>
  <rect x="1" y="1" width="518" height="218" rx="21" fill="none" stroke="#8b5cf6" stroke-opacity="0.45"/>

  <circle cx="30" cy="31" r="7" fill="#22c55e">
    <animate attributeName="opacity" values="1;0.35;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <text x="49" y="38" fill="#f8fafc" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="800">SYSTEM STATUS</text>
  <rect x="28" y="49" width="190" height="4" rx="2" fill="url(#line)"/>

  <g filter="url(#shadow)">
    <rect x="28" y="72" width="220" height="50" rx="12" fill="#0f172a" stroke="#22d3ee" stroke-opacity="0.65"/>
    <text x="44" y="93" fill="#67e8f9" font-size="11" font-family="Segoe UI, Arial, sans-serif" font-weight="700">PROFILE MODE</text>
    <text x="44" y="113" fill="#ffffff" font-size="17" font-family="Segoe UI, Arial, sans-serif" font-weight="800">ACTIVE BUILD</text>

    <rect x="272" y="72" width="220" height="50" rx="12" fill="#0f172a" stroke="#c084fc" stroke-opacity="0.65"/>
    <text x="288" y="93" fill="#e9d5ff" font-size="11" font-family="Segoe UI, Arial, sans-serif" font-weight="700">CURRENT FOCUS</text>
    <text x="288" y="113" fill="#ffffff" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="800">SOFTWARE • AI • DATA</text>

    <rect x="28" y="142" width="220" height="50" rx="12" fill="#0f172a" stroke="#60a5fa" stroke-opacity="0.65"/>
    <text x="44" y="163" fill="#93c5fd" font-size="11" font-family="Segoe UI, Arial, sans-serif" font-weight="700">CURRENT TRACK</text>
    <text x="44" y="183" fill="#ffffff" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="800">UNIVERSITY PROJECTS</text>

    <rect x="272" y="142" width="220" height="50" rx="12" fill="#0f172a" stroke="#f472b6" stroke-opacity="0.65"/>
    <text x="288" y="163" fill="#f9a8d4" font-size="11" font-family="Segoe UI, Arial, sans-serif" font-weight="700">COLLAB STATUS</text>
    <text x="288" y="183" fill="#ffffff" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="800">OPEN TO COLLABORATE</text>
  </g>
</svg>