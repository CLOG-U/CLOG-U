<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="220" viewBox="0 0 1100 220" role="img" aria-label="Carlos Ortiz focus board">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#06b6d4"/><stop offset="1" stop-color="#3b82f6"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#8b5cf6"/><stop offset="1" stop-color="#d946ef"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#f59e0b"/><stop offset="1" stop-color="#ef4444"/></linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.45"/></filter>
  </defs>
  <rect width="1100" height="220" rx="24" fill="url(#bg)"/>
  <text x="42" y="44" fill="#f8fafc" font-size="19" font-family="Segoe UI, Arial" font-weight="800" letter-spacing="1.5">CURRENT FOCUS // BUILDING IN PUBLIC</text>

  <g transform="translate(42 68)" filter="url(#s)">
    <rect width="310" height="112" rx="18" fill="#082f49" stroke="#22d3ee" stroke-opacity="0.8"/>
    <circle cx="32" cy="31" r="12" fill="#22d3ee"><animate attributeName="opacity" values="1;0.35;1" dur="2s" repeatCount="indefinite"/></circle>
    <text x="58" y="38" fill="#cffafe" font-size="18" font-family="Segoe UI, Arial" font-weight="800">SOFTWARE</text>
    <text x="24" y="72" fill="#bae6fd" font-size="15" font-family="Segoe UI, Arial">Arquitectura, backend y</text>
    <text x="24" y="95" fill="#bae6fd" font-size="15" font-family="Segoe UI, Arial">aplicaciones funcionales.</text>
    <rect x="24" y="101" width="250" height="4" rx="2" fill="url(#g1)"/>
  </g>

  <g transform="translate(395 68)" filter="url(#s)">
    <rect width="310" height="112" rx="18" fill="#2e1065" stroke="#c084fc" stroke-opacity="0.85"/>
    <circle cx="32" cy="31" r="12" fill="#c084fc"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" repeatCount="indefinite"/></circle>
    <text x="58" y="38" fill="#f3e8ff" font-size="18" font-family="Segoe UI, Arial" font-weight="800">APPLIED AI</text>
    <text x="24" y="72" fill="#e9d5ff" font-size="15" font-family="Segoe UI, Arial">Agentes, NLP y apoyo</text>
    <text x="24" y="95" fill="#e9d5ff" font-size="15" font-family="Segoe UI, Arial">inteligente con criterio.</text>
    <rect x="24" y="101" width="250" height="4" rx="2" fill="url(#g2)"/>
  </g>

  <g transform="translate(748 68)" filter="url(#s)">
    <rect width="310" height="112" rx="18" fill="#451a03" stroke="#fb923c" stroke-opacity="0.85"/>
    <circle cx="32" cy="31" r="12" fill="#fb923c"><animate attributeName="opacity" values="1;0.35;1" dur="3s" repeatCount="indefinite"/></circle>
    <text x="58" y="38" fill="#ffedd5" font-size="18" font-family="Segoe UI, Arial" font-weight="800">DATA</text>
    <text x="24" y="72" fill="#fed7aa" font-size="15" font-family="Segoe UI, Arial">Modelado, análisis y</text>
    <text x="24" y="95" fill="#fed7aa" font-size="15" font-family="Segoe UI, Arial">decisiones explicables.</text>
    <rect x="24" y="101" width="250" height="4" rx="2" fill="url(#g3)"/>
  </g>
</svg>